<!DOCTYPE html><html lang='ro'><head><meta name='viewport' content='width=device-width,initial-scale=1'>
<style>
*{box-sizing:border-box}body{margin:0;height:100vh;overflow:hidden;font-family:system-ui;background:radial-gradient(circle at top,#243b6b,#02030d);color:#fff}
#sky,#petals{position:fixed;inset:0}.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:tw 2s infinite alternate}
@keyframes tw{to{opacity:.2}}
.card{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:min(92vw,420px);padding:24px;border-radius:28px;background:rgba(255,255,255,.08);backdrop-filter:blur(12px);text-align:center;box-shadow:0 0 30px rgba(255,120,170,.2)}
h1{margin:0;color:#ffd6e7;font-size:2rem}h3{margin:.4rem 0 1rem;color:#ffeaf2}
#msg{min-height:120px;line-height:1.6;font-size:1.08rem}
button{border:none;padding:14px 22px;border-radius:30px;background:#ff4d88;color:#fff;font-size:1rem}
.heart{position:fixed;font-size:24px;animation:rise linear forwards;filter:drop-shadow(0 0 8px #ff5f9f)}
@keyframes rise{from{transform:translateY(110vh) rotateY(0)}to{transform:translateY(-15vh) rotateY(720deg)}}
</style></head><body><div id=sky></div><div class=card><h1>Pentru tine, Maria ❤️</h1><h3>Cea mai specială persoană din viața mea</h3><div id=msg></div><button onclick="boom();setTimeout(()=>open('https://youtu.be/d5xopSfNZB8?is=WG29BlsnYT8NS3P-','_self'),1400)">Ascultă melodia 🎵</button></div>
<script>
for(let i=0;i<180;i++){let s=document.createElement('div');s.className='star';s.style.left=Math.random()*100+'vw';s.style.top=Math.random()*100+'vh';sky.appendChild(s)}
setInterval(()=>{let h=document.createElement('div');h.className='heart';h.textContent='💖';h.style.left=Math.random()*100+'vw';h.style.animationDuration=(5+Math.random()*4)+'s';document.body.appendChild(h);setTimeout(()=>h.remove(),9000)},180);
const msgs=["Te iubesc mai mult decât pot exprima în cuvinte. ❤️","Ești motivul pentru care zâmbesc zi de zi.","Îți mulțumesc că exiști în viața mea.","Cu tine, fiecare clipă devine o amintire frumoasă.","Te voi alege în fiecare zi. Pentru totdeauna. 💍"];
let mi=0,ci=0;const el=msg;
function type(){if(ci<msgs[mi].length){el.innerHTML+=msgs[mi][ci++];setTimeout(type,40)}else setTimeout(()=>{el.innerHTML='';ci=0;mi=(mi+1)%msgs.length;type()},1800)}type();
function boom(){for(let i=0;i<180;i++){let e=document.createElement('div');e.textContent='💗';e.style.position='fixed';e.style.left='50%';e.style.top='60%';let a=Math.random()*6.28,r=40+Math.random()*260;e.animate([{transform:'translate(0,0)'},{transform:`translate(${Math.cos(a)*r}px,${Math.sin(a)*r}px) scale(1.8)`,opacity:0}],{duration:1400});document.body.appendChild(e);setTimeout(()=>e.remove(),1400)}}
</script></body></html>
