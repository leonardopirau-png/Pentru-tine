<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width,initial-scale=1"><style>
body{margin:0;overflow:hidden;height:100vh;background:radial-gradient(circle at top,#1d2951,#03030f);font-family:Arial;color:#fff;display:flex;align-items:center;justify-content:center}
.card{z-index:2;text-align:center;background:rgba(255,255,255,.08);padding:24px;border-radius:24px;backdrop-filter:blur(10px);max-width:90%}
h1{margin:0 0 12px;color:#ffd6e7}.type{border-right:2px solid #fff;white-space:nowrap;overflow:hidden;display:inline-block;animation:blink .7s step-end infinite}
@keyframes blink{50%{border-color:transparent}}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%}
.heart3d{position:absolute;font-size:24px;animation:rise 8s linear infinite;filter:drop-shadow(0 0 8px #ff4d88)}
@keyframes rise{0%{transform:translateY(110vh) rotateY(0deg) scale(.6)}100%{transform:translateY(-15vh) rotateY(720deg) scale(1.3)}}
button{margin-top:18px;padding:14px 22px;border:none;border-radius:30px;background:#ff4d88;color:#fff}
</style></head><body><div class="card"><h1>Pentru tine, Maria ❤️</h1><h3>cea mai specială persoană din viața mea</h3><div id=t class=type></div><p>Ești motivul pentru care zâmbesc zi de zi.</p><button onclick="boom();setTimeout(()=>location.href='https://youtu.be/d5xopSfNZB8?is=WG29BlsnYT8NS3P-',1200)">Ascultă melodia 🎵</button></div><script>
for(let i=0;i<120;i++){let s=document.createElement('div');s.className='star';s.style.left=Math.random()*100+'vw';s.style.top=Math.random()*100+'vh';document.body.appendChild(s)}
setInterval(()=>{let h=document.createElement('div');h.className='heart3d';h.textContent='💖';h.style.left=Math.random()*100+'vw';h.style.animationDuration=(5+Math.random()*4)+'s';document.body.appendChild(h);setTimeout(()=>h.remove(),9000)},250);
const txt="Te iubesc mai mult decât pot exprima în cuvinte. Tu ești steaua care îmi luminează fiecare zi. ❤️";
let i=0;function type(){if(i<txt.length){t.textContent+=txt[i++];setTimeout(type,55)}}type();
function boom(){for(let i=0;i<120;i++){let h=document.createElement('div');h.textContent='💗';h.style.position='absolute';h.style.left='50%';h.style.top='55%';let a=Math.random()*6.28,r=40+Math.random()*240;h.animate([{transform:'translate(0,0) scale(.5)'},{transform:`translate(${Math.cos(a)*r}px,${Math.sin(a)*r}px) scale(1.6)`,opacity:0}],{duration:1200});document.body.appendChild(h);setTimeout(()=>h.remove(),1200)}}
</script></body></html>
