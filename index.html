<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width,initial-scale=1"><style>
body{margin:0;background:linear-gradient(#020111,#191970);overflow:hidden;font-family:sans-serif;color:#fff;display:flex;align-items:center;justify-content:center;height:100vh}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:tw 2s infinite alternate}
@keyframes tw{to{opacity:.2}}
.card{position:relative;z-index:2;text-align:center;background:rgba(255,255,255,.08);padding:24px;border-radius:24px;backdrop-filter:blur(8px);max-width:90%}
.msg{font-size:1.4em;margin:16px 0}
button{padding:14px 22px;border:none;border-radius:30px;background:#ff4d88;color:#fff;font-size:1em}
.heart{position:absolute;color:#ff6aa2;animation:float 6s linear infinite}
@keyframes float{from{transform:translateY(100vh)}to{transform:translateY(-10vh)}}
</style></head><body><div class=card><h1>❤️ Pentru tine ❤️</h1><div class=msg>Ești motivul pentru care zâmbesc zi de zi.</div><div class=msg>Fiecare stea îmi amintește de tine.</div><button onclick="boom();setTimeout(()=>location.href='https://youtu.be/d5xopSfNZB8?is=WG29BlsnYT8NS3P-',1200)">Ascultă melodia 🎵</button></div>
<script>
for(let i=0;i<120;i++){let s=document.createElement('div');s.className='star';s.style.left=Math.random()*100+'vw';s.style.top=Math.random()*100+'vh';document.body.appendChild(s)}
setInterval(()=>{let h=document.createElement('div');h.className='heart';h.textContent='❤';h.style.left=Math.random()*100+'vw';h.style.fontSize=(16+Math.random()*20)+'px';document.body.appendChild(h);setTimeout(()=>h.remove(),6000)},250);
function boom(){for(let i=0;i<120;i++){let h=document.createElement('div');h.textContent='💖';h.style.position='absolute';h.style.left='50%';h.style.top='60%';let a=Math.random()*6.28,r=50+Math.random()*250;h.animate([{transform:'translate(0,0)',opacity:1},{transform:`translate(${Math.cos(a)*r}px,${Math.sin(a)*r}px)`,opacity:0}],{duration:1200});document.body.appendChild(h);setTimeout(()=>h.remove(),1200)}}
</script></body></html>
