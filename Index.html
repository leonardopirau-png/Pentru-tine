<!DOCTYPE html>
<html lang="ro">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pentru iubirea mea ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Poppins,sans-serif;
background:
radial-gradient(circle at top,#23395d,#0b132b 40%,#000 100%);
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
position:relative;

}

.container{

position:relative;
z-index:5;

max-width:700px;

padding:40px;

text-align:center;

background:rgba(255,255,255,.05);

backdrop-filter:blur(10px);

border-radius:25px;

box-shadow:0 0 40px rgba(255,255,255,.1);

}

h1{

font-family:"Dancing Script",cursive;

font-size:60px;

margin-bottom:20px;

color:#ff7aa8;

}

p{

font-size:20px;

line-height:1.8;

margin-bottom:20px;

}

button{

padding:18px 35px;

font-size:18px;

border:none;

border-radius:50px;

background:#ff4d88;

color:white;

cursor:pointer;

transition:.3s;

}

button:hover{

transform:scale(1.08);

box-shadow:0 0 20px #ff4d88;

}

#secret{

display:none;

margin-top:30px;

animation:fade 1.5s;

}

@keyframes fade{

from{

opacity:0;

transform:translateY(20px);

}

to{

opacity:1;

transform:translateY(0);

}

}

/* STELE */

.star{

position:absolute;

width:2px;

height:2px;

background:white;

border-radius:50%;

animation:twinkle 3s infinite;

}

@keyframes twinkle{

0%,100%{

opacity:.2;

}

50%{

opacity:1;

}

}

/* PETALE */

.petal{

position:absolute;

color:white;

font-size:20px;

animation:fall linear forwards;

opacity:.9;

}

@keyframes fall{

from{

transform:translateY(-100px) rotate(0deg);

}

to{

transform:translateY(110vh) rotate(360deg);

}

}

/* INIMI */

.heart{

position:absolute;

pointer-events:none;

font-size:22px;

animation:float 8s linear forwards;

}

@keyframes float{

0%{

transform:translateY(100vh);

opacity:0;

}

20%{

opacity:1;

}

100%{

transform:translateY(-120px);

opacity:0;

}

}

</style>

</head>

<body>

<div class="container">

<h1>Pentru tine ❤️</h1>

<p>

Dacă citești aceste rânduri...

înseamnă că ai găsit locul în care am pus o bucățică din sufletul meu.

</p>

<p>

Îți mulțumesc pentru fiecare zâmbet,

fiecare îmbrățișare,

și pentru faptul că exiști.

</p>

<button onclick="showLove()">

❤️ Ascultă melodia noastră

</button>

<div id="secret">

<h2>

Te iubesc infinit ❤️

</h2>

<p>

Te-aș alege din nou...

de o mie de ori.

</p>

</div>

</div>
<script>

// Creează stelele
for(let i=0;i<180;i++){

const star=document.createElement("div");

star.className="star";

star.style.left=Math.random()*100+"vw";

star.style.top=Math.random()*100+"vh";

star.style.animationDelay=Math.random()*3+"s";

document.body.appendChild(star);

}

// Petale albe
function createPetal(){

const petal=document.createElement("div");

petal.className="petal";

petal.innerHTML="❀";

petal.style.left=Math.random()*100+"vw";

petal.style.animationDuration=(6+Math.random()*6)+"s";

petal.style.fontSize=(14+Math.random()*18)+"px";

document.body.appendChild(petal);

setTimeout(()=>{

petal.remove();

},12000);

}

setInterval(createPetal,350);

// Inimi care urcă
function createHeart(){

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(14+Math.random()*26)+"px";

heart.style.animationDuration=(6+Math.random()*5)+"s";

heart.style.color="#ff6fa9";

document.body.appendChild(heart);

setTimeout(()=>{

heart.remove();

},9000);

}

setInterval(createHeart,250);

// Explozie de inimi + melodia
function showLove(){

document.getElementById("secret").style.display="block";

// Deschide melodia
window.open(
"https://youtu.be/d5xopSfNZB8?is=WG29BlsnYT8NS3P-",
"_blank"
);

// Explozia
for(let i=0;i<120;i++){

const h=document.createElement("div");

h.innerHTML="❤️";

h.style.position="fixed";

h.style.left="50%";

h.style.top="50%";

h.style.fontSize=(18+Math.random()*28)+"px";

h.style.pointerEvents="none";

h.style.zIndex="9999";

const angle=Math.random()*Math.PI*2;

const distance=120+Math.random()*450;

const x=Math.cos(angle)*distance;

const y=Math.sin(angle)*distance;

h.animate([

{

transform:"translate(-50%,-50%) scale(1)",

opacity:1

},

{

transform:`translate(calc(-50% + ${x}px),calc(-50% + ${y}px)) scale(0)`,

opacity:0

}

],{

duration:1800,

easing:"ease-out"

});

document.body.appendChild(h);

setTimeout(()=>{

h.remove();

},1800);

}

}

</script>

</body>
</html>
